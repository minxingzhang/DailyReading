schedule:
  cron: "0 23 * * *"
  lookback_hours: 48
  fallback_lookback_hours: 168   # 7 days: used when a category has too few candidates
  s2_lookback_years: 2           # Semantic Scholar: conferences within last N years (auto-updates with current year)

top_conferences:
  - "NeurIPS"
  - "Neural Information Processing Systems"
  - "ICML"
  - "ICLR"
  - "CVPR"
  - "ICCV"
  - "ECCV"
  - "AAAI"
  - "IJCAI"
  - "ACL"
  - "EMNLP"
  - "NAACL"
  - "COLING"
  - "CCS"
  - "USENIX Security"
  - "IEEE Symposium on Security and Privacy"
  - "NDSS"
  - "RAID"
  - "AsiaCCS"
  - "ICRA"
  - "IROS"
  - "CoRL"
  - "RSS"
  - "HUMANOIDS"
  - "WACV"
  - "SIGGRAPH"

categories:
  llm_security:
    name_zh: "LLM 安全"
    name_en: "LLM Security"
    papers_per_day: 3
    type: worthwhile
    semantic_queries:
      - "LLM security jailbreak adversarial attack prompt injection language model safety"
      - "backdoor attack language model red-teaming hallucination safety alignment"
    arxiv_categories: ["cs.CR", "cs.AI", "cs.LG"]
    keywords:
      - "LLM safety"
      - "LLM security"
      - "jailbreak"
      - "prompt injection"
      - "adversarial attack LLM"
      - "red-teaming language model"
      - "backdoor LLM"

  embodied_security:
    name_zh: "具身智能安全"
    name_en: "Embodied Intelligence Security"
    papers_per_day: 3
    type: worthwhile
    semantic_queries:
      - "jailbreak robot LLM prompt injection embodied agent adversarial attack VLA vision language action world model neural policy safety security"
      - "adversarial attack autonomous driving perception LiDAR camera sensor safety"
      - "physical adversarial attack object detection deep learning safety critical system"
    arxiv_categories: ["cs.RO", "cs.AI", "cs.CR", "cs.CV", "cs.LG"]
    scoring_note: "Layer priority for topic_importance and trend_alignment: (1) Decision layer = HIGHEST — LLM security in embodied contexts (jailbreak/prompt injection targeting robot LLMs, backdoor in VLA/world models, adversarial neural policies), attacks on LLM-based robot decision-making. LLM is the robot brain, so LLM-level attacks are the most critical threat. (2) Perception layer = HIGH — adversarial attacks on any sensing modality (LiDAR, camera, depth, tactile, sensor fusion), adversarial object detection/segmentation/grounding in robot contexts. Perception layer is broader than CV alone. (3) Physical/mechanical layer = LOW, only score high if top-conference and groundbreaking."
    keywords:
      # Decision layer: LLM security in embodied contexts (highest priority)
      - "jailbreak robot"
      - "jailbreak embodied"
      - "prompt injection robot"
      - "embodied LLM safety"
      - "embodied LLM attack"
      - "robot LLM jailbreak"
      - "embodied agent jailbreak"
      - "adversarial instruction robot"
      # Decision layer: attacks on neural/LLM-based policies
      - "adversarial robot policy"
      - "backdoor robot"
      - "VLA attack"
      - "vision language action adversarial"
      - "world model attack"
      - "LLM robot attack"
      - "neural policy attack"
      - "robot policy attack"
      # Perception layer: attacks on sensing (broader than CV)
      - "adversarial attack perception"
      - "LiDAR adversarial"
      - "adversarial point cloud"
      - "adversarial object detection"
      - "adversarial depth estimation"
      - "adversarial semantic segmentation"
      - "adversarial visual grounding"
      - "camera attack autonomous"
      - "adversarial patch robot"
      - "attack autonomous driving"
      - "sensor attack robot"
      - "physical adversarial"

  llm_trends:
    name_zh: "LLM 发展动态"
    name_en: "LLM Development Trends"
    papers_per_day: 3
    type: trending
    semantic_queries:
      - "large language model reasoning multimodal foundation model agent"
      - "RLHF alignment preference optimization instruction tuning LLM benchmark evaluation"
    arxiv_categories: ["cs.AI", "cs.CL", "cs.LG"]
    keywords:
      - "large language model"
      - "reasoning LLM"
      - "multimodal LLM"
      - "language model alignment"
      - "chain-of-thought"
      - "foundation model"

  embodied_trends:
    name_zh: "具身智能发展动态"
    name_en: "Embodied Intelligence Development Trends"
    papers_per_day: 3
    type: trending
    semantic_queries:
      - "LLM embodied agent VLA vision language action world model robot manipulation language-conditioned policy robot planning embodied AI perception"
      - "robot learning reinforcement learning dexterous manipulation grasping imitation learning"
      - "humanoid robot locomotion motion planning whole-body control sim-to-real"
    arxiv_categories: ["cs.RO", "cs.AI", "cs.CV"]
    scoring_note: "Layer priority for topic_importance and trend_alignment: (1) Decision layer = HIGHEST — LLM is the most important component since it serves as the robot brain. This includes VLA, world models, LLM-based robot decision-making/planning/control, language-conditioned policies, LLM for manipulation, dexterous manipulation with neural networks. Any work applying LLM to embodied AI belongs here. (2) Perception layer = HIGH — sensing and scene understanding that enables embodied tasks: 3D scene understanding, SLAM, neural scene representation, depth estimation, semantic segmentation for robots, multi-modal sensing. Perception is broader than CV alone. (3) Physical/mechanical layer (pure hardware, actuator design without learning) = LOW, max 1 paper only if truly exceptional (top conference + high community attention)."
    keywords:
      # Decision layer: LLM in embodied AI (highest priority)
      - "vision language action"
      - "VLA robot"
      - "world model robot"
      - "LLM robot planning"
      - "LLM embodied agent"
      - "language model robot control"
      - "language-conditioned robot"
      - "LLM for manipulation"
      - "robot foundation model"
      - "robot task planning"
      - "robot manipulation policy"
      - "dexterous manipulation"
      - "motion planning robot"
      - "reinforcement learning manipulation"
      # Perception layer: sensing and scene understanding
      - "3D scene understanding"
      - "embodied perception"
      - "robot SLAM"
      - "point cloud robot"
      - "neural scene representation"
      - "depth estimation robot"
      - "semantic segmentation robot"
      - "multi-modal sensing robot"

llm:
  scoring_model: "claude-haiku-4-5-20251001"
  analysis_model: "claude-sonnet-4-6"
  max_candidates_per_category: 50

email:
  sender_name: "DailyPaper Bot"
  subject_prefix: "[DailyPaper]"
  recipients: []  # Populated from GITHUB SECRET: EMAIL_RECIPIENTS (comma-separated)

site:
  base_url: ""  # e.g. https://username.github.io/dailyPaper
  title: "DailyPaper - 每日论文精选"
