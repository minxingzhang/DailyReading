schedule:
  cron: "0 23 * * *"
  lookback_hours: 48
  fallback_lookback_hours: 168   # 7 days: used when a category has too few candidates
  s2_min_year: 2024              # Semantic Scholar: only conferences from this year onwards

top_conferences:
  - "NeurIPS"
  - "Neural Information Processing Systems"
  - "ICML"
  - "ICLR"
  - "CVPR"
  - "ICCV"
  - "ECCV"
  - "AAAI"
  - "IJCAI"
  - "ACL"
  - "EMNLP"
  - "NAACL"
  - "COLING"
  - "CCS"
  - "USENIX Security"
  - "IEEE Symposium on Security and Privacy"
  - "NDSS"
  - "RAID"
  - "AsiaCCS"
  - "ICRA"
  - "IROS"
  - "CoRL"
  - "RSS"
  - "HUMANOIDS"
  - "WACV"
  - "SIGGRAPH"

categories:
  llm_security:
    name_zh: "LLM 安全"
    name_en: "LLM Security"
    papers_per_day: 3
    type: worthwhile
    semantic_query: "LLM security jailbreak adversarial attack prompt injection language model safety"
    arxiv_categories: ["cs.CR", "cs.AI", "cs.LG"]
    keywords:
      - "LLM safety"
      - "LLM security"
      - "jailbreak"
      - "prompt injection"
      - "adversarial attack LLM"
      - "red-teaming language model"
      - "backdoor LLM"

  embodied_security:
    name_zh: "具身智能安全"
    name_en: "Embodied Intelligence Security"
    papers_per_day: 3
    type: worthwhile
    semantic_query: "adversarial attack robot perception policy autonomous driving security attack"
    arxiv_categories: ["cs.RO", "cs.AI", "cs.CR", "cs.CV"]
    keywords:
      # Perception layer attacks
      - "adversarial attack perception"
      - "LiDAR adversarial"
      - "adversarial point cloud"
      - "adversarial object detection"
      - "camera attack autonomous"
      - "adversarial patch robot"
      # Decision layer attacks
      - "adversarial robot policy"
      - "backdoor robot"
      - "attack autonomous driving"
      - "physical adversarial"
      - "robot policy attack"

  llm_trends:
    name_zh: "LLM 发展动态"
    name_en: "LLM Development Trends"
    papers_per_day: 3
    type: trending
    semantic_query: "large language model reasoning multimodal foundation model agent"
    arxiv_categories: ["cs.AI", "cs.CL", "cs.LG"]
    keywords:
      - "large language model"
      - "reasoning LLM"
      - "multimodal LLM"
      - "language model alignment"
      - "chain-of-thought"
      - "foundation model"

  embodied_trends:
    name_zh: "具身智能发展动态"
    name_en: "Embodied Intelligence Development Trends"
    papers_per_day: 3
    type: trending
    semantic_query: "robot manipulation planning embodied AI 3D perception scene understanding vision language action"
    arxiv_categories: ["cs.RO", "cs.AI", "cs.CV"]
    keywords:
      # Decision layer
      - "vision language action"
      - "robot manipulation policy"
      - "dexterous manipulation"
      - "robot task planning"
      - "motion planning robot"
      - "reinforcement learning manipulation"
      - "robot foundation model"
      # Perception layer
      - "3D scene understanding"
      - "embodied perception"
      - "robot SLAM"
      - "point cloud robot"
      - "neural scene representation"

llm:
  scoring_model: "claude-haiku-4-5-20251001"
  analysis_model: "claude-sonnet-4-6"
  max_candidates_per_category: 30

email:
  sender_name: "DailyPaper Bot"
  subject_prefix: "[DailyPaper]"
  recipients: []  # Populated from GITHUB SECRET: EMAIL_RECIPIENTS (comma-separated)

site:
  base_url: ""  # e.g. https://username.github.io/dailyPaper
  title: "DailyPaper - 每日论文精选"
