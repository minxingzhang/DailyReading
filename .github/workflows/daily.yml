name: Daily Paper Digest

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-paper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DailyPaper pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: python -m scripts.main

      - name: Commit and push updated docs + seen_papers
        run: |
          git config user.name "DailyPaper Bot"
          git config user.email "actions@github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "chore: daily digest $(TZ='Asia/Shanghai' date '+%Y-%m-%d') [skip ci]"
          git push
